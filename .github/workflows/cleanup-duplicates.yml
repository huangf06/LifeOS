name: Cleanup Duplicate Anki Cards

on:
  # 仅支持手动触发
  workflow_dispatch:
    inputs:
      dry_run:
        description: '试运行模式（不实际删除）'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  cleanup:
    runs-on: ubuntu-latest
    env:
      ANKI_DATABASE_ID: ff0643bb-9c01-4ab5-9d2e-fe38a79451bb

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install notion-client requests python-dotenv

      - name: Run cleanup
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python3 scripts/cleanup_duplicate_cards.py --dry-run
          else
            python3 scripts/cleanup_duplicate_cards.py
          fi
